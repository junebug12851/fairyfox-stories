# Signed release — build provenance for each version tag.
#
# On a version tag this builds the Jekyll site, packages `_site` into a zip,
# attests keyless SLSA build provenance for it (OpenSSF Scorecard Signed-Releases),
# and publishes a GitHub Release with the artifact attached.
#
# REACTS to a tag; does NOT create one. Tagging stays by hand, so pushing
# `vX.Y.Z` triggers this run.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # keyless signing for provenance
      attestations: write   # write the build-provenance attestation
    steps:
      - uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build the site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Package the site
        run: |
          cd _site
          zip -r "../fairyfox-stories-${GITHUB_REF_NAME}.zip" .
          cd ..

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "fairyfox-stories-*.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" fairyfox-stories-*.zip --title "${GITHUB_REF_NAME}" --generate-notes
